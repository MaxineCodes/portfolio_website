{% extends "base.html" %}

{% block title %}Portfolio{% endblock %}

{% block content %}
<div class="p-5 mb-5 bg-dark text-light rounded-3">
    <div class="container-fluid py-5">
        <h1 class="display-5">My Portfolio</h1>
        <p class="lead">Showcase of my projects and work</p>
    </div>
</div>

<div class="row">
{% for project in projects %}
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <img src={{ project.thumbnail }} class="card-img-top" alt="Project">
            <div class="card-body">
                <h5 class="card-title">{{ project.title }}</h5>
                <a href="/portfolio/{{ project.id }}" class="btn btn-primary btn-lg px-4">View Project</a>
            </div>
        </div>
    </div>
{% endfor %}
</div>
{% endblock %}
