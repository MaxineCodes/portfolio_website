{% extends "base.html" %}

{% block title %}Portfolio{% endblock %}

{% block content %}
{{ page_header("My Portfolio", "Showcase of my projects and work") }}

<div class="row">
{% for project in projects %}
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <img src={{ project.thumbnail }} class="card-img-top" alt="Project">
            <div class="card-body">
                <h5 class="card-title">{{ project.title }}</h5>
                <a href="/portfolio/{{ project.id }}" class="btn btn-primary btn-lg px-4">View Project</a>
            </div>
        </div>
    </div>
{% endfor %}
</div>
{% endblock %}
