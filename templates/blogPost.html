{% extends "base.html" %}

{% block title %}Blog{% endblock %}

{% block content %}
<!-- Hero Section -->
<section class="bg-gradient text-white py-5 mb-5">
    <div class="container">
        <div class="p-2 mb-2 bg-dark text-light rounded-5">
            <div class="container-fluid py-5">
                <h1 class="display-9">{{ blog.title }}</h1>
                <p class="lead">{{ blog.date }}</p>
                <p class="lead">Written by: Maxine Meijboom</p>
            </div>
        </div>
    </div>
</section>

<!-- Blog Post Content -->
<section class="container mb-5">
    <div class="p-5 mb-5 bg-light text-dark rounded-3">
        <div class="container-fluid py-5">
            <p class="lead">{{ blog.content|safe }}</p>
        </div>
    </div>
</section>

{% endblock %}
