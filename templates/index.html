<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}ItsMaxine{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">



</head>
<body>




    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light custom-navbar">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">ItsMaxine.eu</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item active">
                        <a class="nav-link" href="#">/Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">/Portfolio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">/Resume</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">/Blog</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">/Contact</a>
                    </li>
                </ul>

                <form class="d-flex" role="login">
                    <button class="btn btn-outline-success" type="submit">Login</button>
                </form>
            </div>
        </div>
    </nav>

    <!-- Main page container -->
    <div class="container">
    <h1>Test</h1>
    <div class="p-5 mb-5 bg-dark text-light rounded-3">
        <div class="container-fluid py-5">
            <h1 class="display-5">:Hello, I am Maxine █</h1>
            <p class="lead">Software Developer, Technical 3D Artist</p>
        </div>
    </div>
</div>


    <!-- Bootstrap 5 JS Bundle (includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
