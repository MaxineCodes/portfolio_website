{% extends "base.html" %}

{% block title %}Blog{% endblock %}

{% block content %}
<!-- Hero Section -->
<section class="bg-gradient text-white py-5 mb-5">
    <div class="container">
        <div class="p-2 mb-2 bg-dark text-light rounded-5">
            <div class="container-fluid py-5">
                <h1 class="display-9">My Blog</h1>
                <!--<p class="lead"></p>-->
            </div>
        </div>
    </div>
</section>

<!-- Blog Posts List -->
<section class="container mb-5">
    <div class="d-flex flex-column gap-4">
    {% for blog_post in blogs %}
    <div class="card h-100 bg-dark text-light">
        <div class="card-body">
            <h5 class="card-title">{{ blog_post.title }}</h5>
            <p class="card-text">{{ blog_post.description }}</p>
            <a href="/blog/{{ blog_post.id }}" class="btn bg-custom">Read More</a>
        </div>
    </div>
    {% endfor %}
    </div>
</section>
{% endblock %}
